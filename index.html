
<style>
*{box-sizing:border-box;margin:0;padding:0;}
.wrap{padding:0.75rem 0;}
h2.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);}
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:0.75rem;flex-wrap:wrap;}
.toolbar span{font-size:15px;font-weight:500;color:var(--color-text-primary);flex:1;}
button{font-size:12px;height:32px;padding:0 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer;display:inline-flex;align-items:center;gap:5px;}
button:hover{background:var(--color-background-secondary);}
button.add-btn{border-color:#185FA5;color:#185FA5;}
.grid-wrap{width:100%;}
table{width:100%;border-collapse:collapse;table-layout:fixed;}
th{font-size:11px;font-weight:500;color:var(--color-text-secondary);padding:5px 2px;text-align:center;border-bottom:0.5px solid var(--color-border-tertiary);}
th.tc{width:42px;}
td.time-cell{font-size:10px;color:var(--color-text-tertiary);text-align:center;vertical-align:middle;padding:0 2px;border-right:0.5px solid var(--color-border-tertiary);line-height:1.3;}
td.slot{height:64px;border:0.5px solid var(--color-border-tertiary);vertical-align:top;padding:3px;cursor:pointer;}
td.slot:hover{background:var(--color-background-secondary);}
.chip{border-radius:5px;padding:3px 4px;height:100%;display:flex;flex-direction:column;justify-content:center;gap:1px;position:relative;}
.chip .nm{font-size:10px;font-weight:500;line-height:1.2;word-break:break-all;}
.chip .rm{font-size:9px;opacity:0.75;display:flex;align-items:center;gap:2px;line-height:1.2;}
.chip .dl{position:absolute;top:2px;right:2px;font-size:12px;opacity:0;cursor:pointer;background:none;border:none;color:inherit;padding:0;line-height:1;height:auto;}
.chip:hover .dl{opacity:0.7;}
.legend{display:flex;gap:6px;flex-wrap:wrap;margin-top:0.75rem;}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--color-text-secondary);}
.legend-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0;}
.modal-bg{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.38);align-items:flex-end;justify-content:center;z-index:100;min-height:400px;}
.modal-bg.open{display:flex;}
.modal{background:var(--color-background-primary);border-radius:var(--border-radius-lg) var(--border-radius-lg) 0 0;border:0.5px solid var(--color-border-secondary);padding:1.25rem;width:100%;}
.modal h3{font-size:14px;font-weight:500;margin-bottom:0.75rem;}
.field{margin-bottom:10px;}
.field label{font-size:11px;color:var(--color-text-secondary);display:block;margin-bottom:3px;}
.field input{width:100%;font-size:13px;padding:7px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);height:36px;}
.color-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:4px;}
.cdot{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:0.75rem;}
.modal-actions .sv{background:#185FA5;border-color:#185FA5;color:#fff;}
</style>
<div class="wrap">
<h2 class="sr-only">大学時間割 — 月〜金・1〜10限の授業を登録できます</h2>
<div class="toolbar">
  <span><i class="ti ti-calendar-week" style="font-size:16px;vertical-align:-2px;margin-right:5px" aria-hidden="true"></i>時間割</span>
  <button class="add-btn" onclick="openAdd()"><i class="ti ti-plus" aria-hidden="true"></i>追加</button>
  <button onclick="clearAll()" style="color:var(--color-text-secondary)"><i class="ti ti-trash" aria-hidden="true"></i></button>
</div>
<div class="grid-wrap">
<table>
<thead><tr>
  <th class="tc"></th>
  <th>月</th><th>火</th><th>水</th><th>木</th><th>金</th>
</tr></thead>
<tbody id="gb"></tbody>
</table>
</div>
<div class="legend" id="leg"></div>
</div>

<div id="modal" class="modal-bg">
<div class="modal">
  <h3 id="mt">授業を追加</h3>
  <div class="field"><label>授業名</label><input id="fn" type="text" placeholder="例：線形代数学"></div>
  <div class="field"><label>教室・場所</label><input id="fr" type="text" placeholder="例：A棟201"></div>
  <div class="field"><label>担当教員（任意）</label><input id="ft" type="text" placeholder="例：山田 太郎"></div>
  <div class="field"><label>色</label><div class="color-row" id="cr"></div></div>
  <div class="modal-actions">
    <button onclick="closeModal()">キャンセル</button>
    <button class="sv" onclick="saveCourse()">保存</button>
  </div>
</div>
</div>

<script>
const DAYS=['月','火','水','木','金'];
const PERIODS=[
  {l:'1限',t:'9:00–9:50'},
  {l:'2限',t:'10:00–10:50'},
  {l:'3限',t:'11:00–11:50'},
  {l:'4限',t:'12:00–12:50'},
  {l:'5限',t:'13:00–13:50'},
  {l:'6限',t:'14:00–14:50'},
  {l:'7限',t:'15:00–15:50'},
  {l:'8限',t:'16:00–16:50'},
  {l:'9限',t:'17:00–17:50'},
  {l:'10限',t:'18:00–18:50'},
];
const COLORS=[
  {bg:'#E6F1FB',tx:'#0C447C',bd:'#85B7EB'},
  {bg:'#EAF3DE',tx:'#27500A',bd:'#97C459'},
  {bg:'#FAEEDA',tx:'#633806',bd:'#EF9F27'},
  {bg:'#FBEAF0',tx:'#72243E',bd:'#ED93B1'},
  {bg:'#E1F5EE',tx:'#085041',bd:'#5DCAA7'},
  {bg:'#EEEDFE',tx:'#3C3489',bd:'#AFA9EC'},
  {bg:'#FAECE7',tx:'#712B13',bd:'#F0997B'},
  {bg:'#F1EFE8',tx:'#444441',bd:'#B4B2A9'},
];
let courses={};
let pending=null;
let selColor=0;
try{courses=JSON.parse(localStorage.getItem('tt_courses')||'{}');}catch(e){}
function ss(){try{localStorage.setItem('tt_courses',JSON.stringify(courses));}catch(e){}}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function buildGrid(){
  const tb=document.getElementById('gb');
  tb.innerHTML='';
  PERIODS.forEach((p,pi)=>{
    const tr=document.createElement('tr');
    const tc=document.createElement('td');
    tc.className='time-cell';
    tc.innerHTML=`<div style="font-weight:500">${p.l}</div><div>${p.t}</div>`;
    tr.appendChild(tc);
    DAYS.forEach((_,di)=>{
      const td=document.createElement('td');
      td.className='slot';
      const key=`${di}_${pi}`;
      if(courses[key]){
        const c=courses[key];
        const col=COLORS[c.color]||COLORS[0];
        td.innerHTML=`<div class="chip" style="background:${col.bg};color:${col.tx};border:0.5px solid ${col.bd}">
          <span class="nm">${esc(c.name)}</span>
          ${c.room?`<span class="rm"><i class="ti ti-map-pin" style="font-size:9px" aria-hidden="true"></i>${esc(c.room)}</span>`:''}
          ${c.teacher?`<span class="rm"><i class="ti ti-user" style="font-size:9px" aria-hidden="true"></i>${esc(c.teacher)}</span>`:''}
          <button class="dl" onclick="del(event,'${key}')" aria-label="削除"><i class="ti ti-x" aria-hidden="true"></i></button>
        </div>`;
      } else {
        td.onclick=()=>openAdd(di,pi);
      }
      tr.appendChild(td);
    });
    tb.appendChild(tr);
  });
  buildLeg();
}
function buildLeg(){
  const used={};
  Object.values(courses).forEach(c=>{used[c.name]=c.color;});
  document.getElementById('leg').innerHTML=Object.entries(used).map(([n,ci])=>{
    const col=COLORS[ci]||COLORS[0];
    return `<span class="legend-item"><span class="legend-dot" style="background:${col.bg};border:0.5px solid ${col.bd}"></span>${esc(n)}</span>`;
  }).join('');
}
function openAdd(day,period){
  pending={day,period};
  document.getElementById('fn').value='';
  document.getElementById('fr').value='';
  document.getElementById('ft').value='';
  document.getElementById('mt').textContent=day!==undefined?`${DAYS[day]}曜 ${PERIODS[period].l} — 授業を追加`:'授業を追加';
  buildCP();
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('fn').focus(),50);
}
function buildCP(){
  const row=document.getElementById('cr');
  row.innerHTML='';
  COLORS.forEach((c,i)=>{
    const d=document.createElement('div');
    d.className='cdot';
    d.style.background=c.bg;
    d.style.borderColor=i===selColor?c.tx:c.bd;
    d.style.transform=i===selColor?'scale(1.2)':'';
    d.onclick=()=>{selColor=i;buildCP();};
    row.appendChild(d);
  });
}
function closeModal(){
  document.getElementById('modal').classList.remove('open');
  pending=null;
}
document.getElementById('modal').addEventListener('click',e=>{
  if(e.target===document.getElementById('modal'))closeModal();
});
function saveCourse(){
  const name=document.getElementById('fn').value.trim();
  if(!name){document.getElementById('fn').focus();return;}
  const room=document.getElementById('fr').value.trim();
  const teacher=document.getElementById('ft').value.trim();
  if(pending&&pending.day!==undefined){
    courses[`${pending.day}_${pending.period}`]={name,room,teacher,color:selColor};
    ss();
  }
  closeModal();
  buildGrid();
}
function del(e,key){
  e.stopPropagation();
  delete courses[key];
  ss();
  buildGrid();
}
function clearAll(){
  if(!Object.keys(courses).length)return;
  if(confirm('すべての授業を削除しますか？')){courses={};ss();buildGrid();}
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeModal();
  if(e.key==='Enter'&&document.getElementById('modal').classList.contains('open'))saveCourse();
});
buildCP();
buildGrid();
</script>
