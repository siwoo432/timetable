<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>時間割</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f3;
    --text: #1a1a18; --text2: #6b6b68; --text3: #999994;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --rm: 8px; --rl: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #252523;
      --text: #f0ede8; --text2: #a09d98; --text3: #68655f;
      --border: rgba(255,255,255,0.12); --border2: rgba(255,255,255,0.22);
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg2); color: var(--text); min-height: 100vh; padding: 1rem 0.75rem; }
  .container { max-width: 680px; margin: 0 auto; }
  header { display: flex; align-items: center; margin-bottom: 1rem; gap: 8px; }
  header h1 { font-size: 18px; font-weight: 500; flex: 1; }
  button { font-size: 12px; height: 32px; padding: 0 12px; border-radius: var(--rm); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); cursor: pointer; display: inline-flex; align-items: center; gap: 5px; transition: background 0.1s; }
  button:hover { background: var(--bg2); }
  button.add { border-color: #185FA5; color: #185FA5; }
  .card { background: var(--bg); border-radius: var(--rl); border: 0.5px solid var(--border); overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; min-width: 320px; }
  th { font-size: 11px; font-weight: 500; color: var(--text2); padding: 6px 2px; text-align: center; border-bottom: 0.5px solid var(--border); }
  th.tc { width: 48px; }
  td.time-cell { font-size: 10px; color: var(--text3); text-align: center; vertical-align: middle; padding: 0 2px; border-right: 0.5px solid var(--border); line-height: 1.3; }
  td.slot { height: 62px; border: 0.5px solid var(--border); vertical-align: top; padding: 3px; cursor: pointer; }
  td.slot:active { background: var(--bg2); }
  .chip { border-radius: 5px; padding: 3px 5px; height: 100%; display: flex; flex-direction: column; justify-content: center; gap: 2px; }
  .chip .nm { font-size: 11px; font-weight: 500; line-height: 1.2; word-break: break-all; }
  .chip .sub { font-size: 10px; opacity: 0.75; display: flex; align-items: center; gap: 2px; line-height: 1.2; }
  .legend { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 0.75rem; }
  .li { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text2); }
  .ld { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }

  .sheet-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); align-items: flex-end; justify-content: center; z-index: 100; }
  .sheet-bg.open { display: flex; }
  .sheet { background: var(--bg); border-radius: var(--rl) var(--rl) 0 0; border: 0.5px solid var(--border2); padding: 1.25rem; width: 100%; max-width: 680px; }
  .sheet h3 { font-size: 14px; font-weight: 500; margin-bottom: 0.75rem; }
  .field { margin-bottom: 10px; }
  .field label { font-size: 11px; color: var(--text2); display: block; margin-bottom: 3px; }
  .field input { width: 100%; font-size: 13px; padding: 7px 10px; border-radius: var(--rm); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); height: 38px; }
  .cr { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
  .cdot { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.1s; }
  .sheet-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 0.75rem; }
  .sheet-actions .sv { background: #185FA5; border-color: #185FA5; color: #fff; }
  .del-btn { width: 100%; margin-top: 8px; border-color: #E24B4A; color: #E24B4A; justify-content: center; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1><i class="ti ti-calendar-week" style="font-size:16px;vertical-align:-2px;margin-right:5px" aria-hidden="true"></i>時間割</h1>
    <button class="add" onclick="openAdd()"><i class="ti ti-plus" aria-hidden="true"></i>授業を追加</button>
    <button onclick="clearAll()" style="color:var(--text2)" aria-label="全削除"><i class="ti ti-trash" aria-hidden="true"></i></button>
  </header>
  <div class="card">
    <table>
      <thead><tr>
        <th class="tc"></th>
        <th>月</th><th>火</th><th>水</th><th>木</th><th>金</th>
      </tr></thead>
      <tbody id="gb"></tbody>
    </table>
  </div>
  <div class="legend" id="leg"></div>
</div>

<div id="modal" class="sheet-bg">
  <div class="sheet">
    <h3 id="mt">授業を追加</h3>
    <div class="field"><label>授業名</label><input id="fn" type="text" placeholder="例：線形代数学"></div>
    <div class="field"><label>教室・場所</label><input id="fr" type="text" placeholder="例：A棟201"></div>
    <div class="field"><label>担当教員（任意）</label><input id="ft" type="text" placeholder="例：山田 太郎"></div>
    <div class="field"><label>色</label><div class="cr" id="cr"></div></div>
    <div class="sheet-actions">
      <button onclick="closeModal()">キャンセル</button>
      <button class="sv" onclick="saveCourse()">保存</button>
    </div>
    <button class="del-btn" id="del-btn" onclick="deleteCurrentCourse()" style="display:none"><i class="ti ti-trash" aria-hidden="true"></i>この授業を削除</button>
  </div>
</div>

<script>
const DAYS=['月','火','水','木','金'];
const PERIODS=[
  {l:'1限',t:'9:00–9:50'},{l:'2限',t:'10:00–10:50'},{l:'3限',t:'11:00–11:50'},
  {l:'4限',t:'12:00–12:50'},{l:'5限',t:'13:00–13:50'},{l:'6限',t:'14:00–14:50'},
  {l:'7限',t:'15:00–15:50'},{l:'8限',t:'16:00–16:50'},{l:'9限',t:'17:00–17:50'},
  {l:'10限',t:'18:00–18:50'},
];
const COLORS=[
  {bg:'#E6F1FB',tx:'#0C447C',bd:'#85B7EB'},
  {bg:'#EAF3DE',tx:'#27500A',bd:'#97C459'},
  {bg:'#FAEEDA',tx:'#633806',bd:'#EF9F27'},
  {bg:'#FBEAF0',tx:'#72243E',bd:'#ED93B1'},
  {bg:'#E1F5EE',tx:'#085041',bd:'#5DCAA7'},
  {bg:'#EEEDFE',tx:'#3C3489',bd:'#AFA9EC'},
  {bg:'#FAECE7',tx:'#712B13',bd:'#F0997B'},
  {bg:'#F1EFE8',tx:'#444441',bd:'#B4B2A9'},
];
let courses={};
let pending=null;
let editKey=null;
let selColor=0;
try{courses=JSON.parse(localStorage.getItem('tt_courses')||'{}');}catch(e){}
function ss(){try{localStorage.setItem('tt_courses',JSON.stringify(courses));}catch(e){}}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function buildGrid(){
  const tb=document.getElementById('gb');
  tb.innerHTML='';
  PERIODS.forEach((p,pi)=>{
    const tr=document.createElement('tr');
    const tc=document.createElement('td');
    tc.className='time-cell';
    tc.innerHTML=`<div style="font-weight:500">${p.l}</div><div>${p.t}</div>`;
    tr.appendChild(tc);
    DAYS.forEach((_,di)=>{
      const td=document.createElement('td');
      td.className='slot';
      const key=`${di}_${pi}`;
      if(courses[key]){
        const c=courses[key];
        const col=COLORS[c.color]||COLORS[0];
        td.innerHTML=`<div class="chip" style="background:${col.bg};color:${col.tx};border:0.5px solid ${col.bd}">
          <span class="nm">${esc(c.name)}</span>
          ${c.room?`<span class="sub"><i class="ti ti-map-pin" style="font-size:9px" aria-hidden="true"></i>${esc(c.room)}</span>`:''}
          ${c.teacher?`<span class="sub"><i class="ti ti-user" style="font-size:9px" aria-hidden="true"></i>${esc(c.teacher)}</span>`:''}
        </div>`;
        td.onclick=()=>openEdit(di,pi);
      } else {
        td.onclick=()=>openAdd(di,pi);
      }
      tr.appendChild(td);
    });
    tb.appendChild(tr);
  });
  buildLeg();
}
function buildLeg(){
  const used={};
  Object.values(courses).forEach(c=>{used[c.name]=c.color;});
  document.getElementById('leg').innerHTML=Object.entries(used).map(([n,ci])=>{
    const col=COLORS[ci]||COLORS[0];
    return `<span class="li"><span class="ld" style="background:${col.bg};border:0.5px solid ${col.bd}"></span>${esc(n)}</span>`;
  }).join('');
}
function openAdd(day,period){
  pending={day,period};
  editKey=null;
  document.getElementById('fn').value='';
  document.getElementById('fr').value='';
  document.getElementById('ft').value='';
  selColor=0;
  document.getElementById('mt').textContent=day!==undefined?`${DAYS[day]}曜 ${PERIODS[period].l} — 授業を追加`:'授業を追加';
  document.getElementById('del-btn').style.display='none';
  buildCP();
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('fn').focus(),50);
}
function openEdit(day,period){
  const key=`${day}_${period}`;
  const c=courses[key];
  if(!c)return;
  pending={day,period};
  editKey=key;
  document.getElementById('fn').value=c.name;
  document.getElementById('fr').value=c.room||'';
  document.getElementById('ft').value=c.teacher||'';
  selColor=c.color||0;
  document.getElementById('mt').textContent=`${DAYS[day]}曜 ${PERIODS[period].l} — 編集`;
  document.getElementById('del-btn').style.display='flex';
  buildCP();
  document.getElementById('modal').classList.add('open');
}
function buildCP(){
  const row=document.getElementById('cr');
  row.innerHTML='';
  COLORS.forEach((c,i)=>{
    const d=document.createElement('div');
    d.className='cdot';
    d.style.background=c.bg;
    d.style.borderColor=i===selColor?c.tx:c.bd;
    d.style.transform=i===selColor?'scale(1.2)':'';
    d.onclick=()=>{selColor=i;buildCP();};
    row.appendChild(d);
  });
}
function closeModal(){
  document.getElementById('modal').classList.remove('open');
  pending=null;
  editKey=null;
}
document.getElementById('modal').addEventListener('click',e=>{
  if(e.target===document.getElementById('modal'))closeModal();
});
function saveCourse(){
  const name=document.getElementById('fn').value.trim();
  if(!name){document.getElementById('fn').focus();return;}
  const room=document.getElementById('fr').value.trim();
  const teacher=document.getElementById('ft').value.trim();
  if(pending&&pending.day!==undefined){
    courses[`${pending.day}_${pending.period}`]={name,room,teacher,color:selColor};
    ss();
  }
  closeModal();
  buildGrid();
}
function deleteCurrentCourse(){
  if(editKey){
    delete courses[editKey];
    ss();
    closeModal();
    buildGrid();
  }
}
function clearAll(){
  if(!Object.keys(courses).length)return;
  if(confirm('すべての授業を削除しますか？')){courses={};ss();buildGrid();}
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeModal();
  if(e.key==='Enter'&&document.getElementById('modal').classList.contains('open'))saveCourse();
});
buildCP();
buildGrid();
</script>
</body>
</html>
